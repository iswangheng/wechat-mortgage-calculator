<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1677FF"/>
      <stop offset="100%" style="stop-color:#0052D9"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="144" height="144" rx="32" fill="url(#bg)"/>
  <!-- House roof -->
  <polygon points="72,28 108,58 36,58" fill="#ffffff" opacity="0.95"/>
  <!-- House body -->
  <rect x="44" y="58" width="56" height="40" rx="2" fill="#ffffff" opacity="0.95"/>
  <!-- Calculator screen -->
  <rect x="52" y="64" width="40" height="14" rx="3" fill="#0052D9" opacity="0.6"/>
  <!-- Screen text ¥ -->
  <text x="72" y="75" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">¥ 月供</text>
  <!-- Calculator buttons row 1 -->
  <rect x="52" y="82" width="8" height="6" rx="1.5" fill="#d6e4ff"/>
  <rect x="63" y="82" width="8" height="6" rx="1.5" fill="#d6e4ff"/>
  <rect x="74" y="82" width="8" height="6" rx="1.5" fill="#d6e4ff"/>
  <rect x="84" y="82" width="8" height="6" rx="1.5" fill="#ffd666"/>
  <!-- Calculator buttons row 2 -->
  <rect x="52" y="91" width="8" height="6" rx="1.5" fill="#d6e4ff"/>
  <rect x="63" y="91" width="8" height="6" rx="1.5" fill="#d6e4ff"/>
  <rect x="74" y="91" width="8" height="6" rx="1.5" fill="#d6e4ff"/>
  <rect x="84" y="91" width="8" height="6" rx="1.5" fill="#4cd964"/>
  <!-- Bottom tagline -->
  <text x="72" y="120" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle" opacity="0.9">2026</text>
</svg>
